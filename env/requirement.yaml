# Conda environment for Sequence Space Explorer (SSE).
#
# Create it with:
#   conda env create -f env/requirement.yaml
#
# Then activate it (every time you want to run SSE):
#   conda activate sse
#
# If this file changes later (new dependency added), refresh an existing
# environment instead of recreating it:
#   conda env update -f env/requirement.yaml --prune

name: sse

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip

  # --- core: datafile I/O, the visualizer, taxonomy lookups -----------------
  - pandas
  - numpy
  - requests
  - tqdm
  - biopython
  - scikit-learn
  - matplotlib

  # --- everything below is installed via pip inside the conda env -----------
  - pip:
      - dash
      - plotly
      - kaleido>=1.0.0        # figure export (PNG/SVG/PDF) in the visualizer
      - umap-learn            # --reducer umap

      # PyTorch: this installs a CPU-only build by default, which works
      # everywhere but embeds sequences slowly. If you have an NVIDIA GPU
      # (or Apple Silicon), see the "GPU acceleration" section in the main
      # README after creating this environment.
      - torch

      - transformers          # --embedder prostt5 / saprot
      - sentencepiece         # tokenizer dependency for ProstT5
      - esm                   # --embedder esmc
      - mini3di               # structure -> 3Di conversion (prostt5 / saprot)
